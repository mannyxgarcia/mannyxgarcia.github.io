<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Sign Up Page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
          <h1 class="mb-4">Sign Up Form</h1>

          <form id="signupForm" action="welcome.html">
            <div class="mb-3">
              <label for="fName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="fName" name="fName" />
            </div>

            <div class="mb-3">
              <label for="lName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lName" name="lName" />
            </div>

            <div class="mb-3">
              <label class="form-label">Gender</label>

              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="male"
                  value="m"
                />
                <label class="form-check-label" for="male"> Male </label>
              </div>

              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="gender"
                  id="female"
                  value="f"
                />
                <label class="form-check-label" for="female"> Female </label>
              </div>
            </div>

            <div class="mb-3">
              <label for="zip" class="form-label">Zip Code</label>
              <input type="text" class="form-control" id="zip" name="zip" />
            </div>

            <div class="mb-4">
              <p class="mb-1">City: <span id="city"></span></p>
              <p class="mb-1">Latitude: <span id="latitude"></span></p>
              <p class="mb-0">Longitude: <span id="longitude"></span></p>
            </div>

            <div class="mb-3">
              <label for="state" class="form-label">State</label>
              <select class="form-select" id="state" name="state">
                <option value="">Loading states...</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="county" class="form-label">County</label>
              <select class="form-select" id="county" name="county"></select>
            </div>

            <div class="mb-3">
              <label for="username" class="form-label">
                Desired Username
              </label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
              />
              <small id="usernameError"></small>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label"> Password </label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
              />
              <small id="suggestedPassword"></small>
            </div>

            <div class="mb-3">
              <label for="passwordAgain" class="form-label">
                Type Password Again
              </label>
              <input
                type="password"
                class="form-control"
                id="passwordAgain"
                name="passwordAgain"
              />
              <small id="passwordError"></small>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg">
                Sign Up!
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
